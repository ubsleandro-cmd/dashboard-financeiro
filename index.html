<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dashboard Financeiro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <style>
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%;
      overflow: hidden; background: #0f172a; 
    }
    iframe { 
      width: 100%; height: 100%; border: none; 
      /* Melhora a rolagem no iOS */
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbzIs1v2IkjhGIwIp9ImBKo7KFvVkdzYCxcXhxV67O4HdXXhYNH0kdQmMwvkvOc5PdWNPw/exec"></iframe>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Impede que o "puxar para baixo" recarregue a página no Chrome Mobile
    document.body.addEventListener('touchmove', function(e) {
      if (e.target.tagName !== 'IFRAME') {
        e.preventDefault();
      }
    }, {passive: false});
  </script>
</body>
</html>
